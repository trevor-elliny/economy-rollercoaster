<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Results — The Economy Roller Coaster</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7101645735981580" crossorigin="anonymous"></script>
  <style>
    .results-hero {
      text-align: center;
      padding: 2rem 1rem 0.5rem;
    }
    .results-hero h2 {
      font-family: 'Georgia', serif;
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      color: #888;
      font-weight: normal;
      margin-bottom: 0.3rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .vote-total {
      font-family: 'Georgia', serif;
      font-size: clamp(2.5rem, 6vw, 5rem);
      color: #C9A456;
      font-weight: bold;
      line-height: 1;
      text-shadow: 0 0 40px rgba(201,164,86,0.35);
    }
    .vote-total-label {
      font-size: 0.85rem;
      color: #666;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 0.3rem;
    }
    .zone-legend {
      max-width: 700px;
      margin: 2rem auto 0;
      padding: 0 1rem;
    }
    .zone-legend h3 {
      font-family: 'Georgia', serif;
      color: #C9A456;
      font-size: 1rem;
      text-align: center;
      margin-bottom: 1rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .zone-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.45rem 0.75rem;
      border-radius: 4px;
      margin-bottom: 0.3rem;
      transition: background 0.15s;
    }
    .zone-row:hover { background: rgba(255,255,255,0.04); }
    .zone-num {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(201,164,86,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: #FFD700;
      font-weight: bold;
      flex-shrink: 0;
    }
    .zone-num.peak { background: #CC0000; }
    .zone-label-text {
      font-size: 0.82rem;
      color: #bbb;
      flex: 1;
    }
    .zone-bar-wrap {
      width: 100px;
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .zone-bar {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, #1a6bcc, #FFD700, #CC0000);
      transition: width 0.6s ease;
    }
    .zone-pct {
      font-size: 0.75rem;
      color: #666;
      width: 34px;
      text-align: right;
      flex-shrink: 0;
    }
    .cast-vote-btn {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.65rem 2rem;
      background: transparent;
      border: 1px solid rgba(201,164,86,0.5);
      color: #C9A456;
      font-family: 'Georgia', serif;
      font-size: 0.95rem;
      border-radius: 4px;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
      letter-spacing: 0.04em;
    }
    .cast-vote-btn:hover {
      background: rgba(201,164,86,0.1);
      border-color: #C9A456;
    }
    .results-actions {
      text-align: center;
      margin: 1.5rem 0 0;
    }
    .live-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #5fd35f;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 2s infinite;
      vertical-align: middle;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
  </style>
</head>
<body>

  <!-- TOP AD -->
  <div class="ad-banner ad-top">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-7101645735981580"
         data-ad-slot="XXXXXXXXXX"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>

  <header>
    <h1>The Economy Roller Coaster</h1>
    <p class="subtitle"><span class="live-dot"></span>Live Results</p>
  </header>

  <main>
    <!-- VOTE COUNT HERO -->
    <div class="results-hero">
      <h2>Total Votes Cast</h2>
      <div class="vote-total" id="hero-vote-count">—</div>
      <div class="vote-total-label">and counting</div>
    </div>

    <!-- HEATMAP TRACK -->
    <div class="coaster-wrapper heatmap-view" style="margin-top:1.5rem;">
      <svg id="results-svg" viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
        <defs>
          <linearGradient id="trackGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#FFD700" />
            <stop offset="40%"  stop-color="#FFA500" />
            <stop offset="50%"  stop-color="#CC5500" />
            <stop offset="65%"  stop-color="#8B1A1A" />
            <stop offset="80%"  stop-color="#4A0A0A" />
            <stop offset="100%" stop-color="#1A0A00" />
          </linearGradient>
          <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#87CEEB" />
            <stop offset="42%"  stop-color="#4A7C9E" />
            <stop offset="55%"  stop-color="#2C3E50" />
            <stop offset="75%"  stop-color="#1A1A2E" />
            <stop offset="100%" stop-color="#0D0D0D" />
          </linearGradient>
          <linearGradient id="groundGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#5D8A3C" />
            <stop offset="45%"  stop-color="#7A6A3C" />
            <stop offset="70%"  stop-color="#4A3B2A" />
            <stop offset="100%" stop-color="#1A1208" />
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <clipPath id="trackClip">
            <rect x="0" y="0" width="1200" height="500"/>
          </clipPath>
        </defs>

        <rect x="0" y="0" width="1200" height="420" fill="url(#skyGrad)" />
        <rect x="0" y="420" width="1200" height="80" fill="url(#groundGrad)" />

        <!-- Sun -->
        <circle cx="80" cy="60" r="40" fill="#FFD700" opacity="0.85"/>
        <g stroke="#FFD700" stroke-width="2" opacity="0.6">
          <line x1="80" y1="10" x2="80" y2="0"/>
          <line x1="120" y1="20" x2="130" y2="12"/>
          <line x1="130" y1="60" x2="142" y2="60"/>
          <line x1="120" y1="100" x2="130" y2="108"/>
          <line x1="80" y1="110" x2="80" y2="120"/>
          <line x1="40" y1="100" x2="30" y2="108"/>
          <line x1="30" y1="60" x2="18" y2="60"/>
          <line x1="40" y1="20" x2="30" y2="12"/>
        </g>

        <!-- Storm clouds -->
        <g opacity="0.7">
          <ellipse cx="950" cy="55" rx="70" ry="35" fill="#2C2C2C"/>
          <ellipse cx="1000" cy="45" rx="55" ry="30" fill="#3A3A3A"/>
          <ellipse cx="1070" cy="60" rx="65" ry="32" fill="#222"/>
          <ellipse cx="1130" cy="50" rx="50" ry="28" fill="#1A1A1A"/>
          <polygon points="1010,80 1002,110 1010,108 1000,140 1018,100 1010,102" fill="#FFD700" opacity="0.9"/>
        </g>

        <!-- Track — same path as index.html -->
        <path id="track-path"
          d="M 30,380
             C 80,375 150,355 210,325
             C 270,295 330,262 385,228
             C 420,208 450,178 475,148
             C 495,122 508,72 520,25
             C 532,72 545,128 568,180
             C 590,228 612,272 635,305
             C 652,328 667,350 680,368
             C 693,360 700,340 703,318
             C 706,296 703,272 698,250
             C 693,228 685,208 678,190
             C 671,172 665,158 665,145
             C 665,132 671,120 683,112
             C 695,104 712,102 728,108
             C 744,114 756,126 762,142
             C 768,158 768,178 762,196
             C 756,214 744,228 728,236
             C 712,244 695,244 683,238
             C 671,232 665,220 665,208
             C 665,200 668,193 672,188
             C 690,200 710,205 728,202
             C 760,196 782,170 782,142
             C 782,136 781,130 780,125
             C 800,130 820,145 835,162
             C 855,184 868,212 874,238
             C 876,248 877,258 876,266
             C 874,280 868,292 860,300
             C 880,305 900,318 916,335
             C 936,356 948,382 950,400
             C 960,395 975,385 990,375
             C 1010,362 1030,348 1055,340
             C 1080,332 1110,332 1140,338
             C 1160,342 1175,350 1185,360"
          fill="none"
          stroke="url(#trackGrad)"
          stroke-width="8"
          stroke-linecap="round"
          stroke-linejoin="round"
        />

        <!-- Heat map layer -->
        <g id="heat-map-layer" clip-path="url(#trackClip)"></g>

        <!-- Zone markers -->
        <g id="zone-labels" font-family="'Courier New', monospace" font-size="11" fill="white" text-anchor="middle"></g>
      </svg>
    </div>

    <!-- SHARE SECTION -->
    <div class="share-section" style="margin-top:2rem;">
      <p>Share the results:</p>
      <div class="share-buttons">
        <button class="btn-share btn-twitter" onclick="shareTwitter()">Share on X</button>
        <button class="btn-share btn-facebook" onclick="shareFacebook()">Share on Facebook</button>
        <button class="btn-share btn-copy" onclick="copyLink()">Copy Link</button>
      </div>
      <p id="copy-confirm" class="copy-confirm"></p>
    </div>

    <!-- MID AD -->
    <div class="ad-banner ad-mid">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-7101645735981580"
           data-ad-slot="XXXXXXXXXX"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <!-- ZONE BREAKDOWN -->
    <div class="zone-legend">
      <h3>Zone Breakdown</h3>
      <div id="zone-breakdown"></div>
    </div>

    <!-- BACK TO VOTE -->
    <div class="results-actions">
      <a href="/" class="cast-vote-btn">← Cast Your Vote</a>
    </div>

    <!-- BOTTOM AD -->
    <div class="ad-banner ad-bottom">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-7101645735981580"
           data-ad-slot="XXXXXXXXXX"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
  </main>

  <footer>
    <p>This site is for entertainment and opinion purposes only. Not financial advice. &nbsp;|&nbsp; <a href="/privacy.html" style="color:rgba(255,255,255,0.4)">Privacy Policy</a></p>
  </footer>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { firebaseConfig } from "./js/firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    const votesRef = ref(db, "votes");
    onValue(votesRef, (snapshot) => {
      const data = snapshot.val() || {};
      window.dispatchEvent(new CustomEvent("votes-updated", { detail: data }));
    });
  </script>

  <script src="js/track.js"></script>
  <script src="js/results.js"></script>
</body>
</html>
